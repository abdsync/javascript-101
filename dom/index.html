<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <!-- HTML -->
    <header id="main-header" class="bg-success">
      <div class="container">
        <h1 id="header-title">Item Lister <span style="display: none;">HPP</span></h1>
      </div> <!-- container-->
    </header>
    <div class="container">  
        <div id="main" class="card card-body">
        
          <h2 class="title">Add Items</h2>
          <form id="first-form">
            <input id="txt-box" type="text" class="text-box" value="Write here!">
            <select id="select" class="form-control">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
            <input type="submit" class="btn" value="Submit">
          </form>
        
          <h2 class="title">Items</h2>
        
          <ul id="items" class="list-group">
            <li class="list-group-item">item 1</li>
            <li class="list-group-item">item 2</li>
            <li class="list-group-item">item 3</li>
            <li class="list-group-item">item 4</li>
             <!--<li>Test item</li>-->
          </ul>
          <div id="output"></div>
          <br>
          <button class="btn btn-dark btn-block" id="button">Click Here!</button>
          <br>
          <br>
          <div id="box" style="width: 400px; height: 200px; background-color: #f4f4f4;"><h2>Boxx</h2></div>

          <!--<span>ABCDE</span>-->
        
        </div> <!-- main -- card -- card-body -->
    </div> <!-- container -->
    <script src="dom.js"></script>
</body>
</html>
